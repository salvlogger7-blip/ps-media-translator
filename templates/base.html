<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS MEDIA AI VOICE</title>
    <style>
        :root { --main-red: #800000; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #eee; }
        body { background: var(--dark-bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .header { background: var(--main-red); padding: 20px; text-align: center; font-weight: bold; font-size: 22px; box-shadow: 0 4px 10px #000; }
        .container { display: flex; justify-content: center; padding: 20px; }
        .main-card { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 420px; border: 1px solid #333; box-shadow: 0 0 30px rgba(128,0,0,0.2); }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #666; }
        input[type=range] { width: 100%; accent-color: var(--main-red); cursor: pointer; }
        .group { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        select, .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; }
        select { background: #333; color: #fff; margin-top: 5px; }
        .btn-main { background: var(--main-red); color: white; font-size: 18px; margin-top: 15px; cursor: pointer; }
        .btn-preview { background: #444; color: white; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">PS MEDIA AI VOICE</div>
    <div class="container">{% block content %}{% endblock %}</div>
    <div class="footer">© 2026 PS MEDIA - រក្សាសិទ្ធិគ្រប់យ៉ាង</div>
</body>
</html>
