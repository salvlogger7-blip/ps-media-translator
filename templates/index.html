<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>PS MEDIA PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main-red: #ff3e3e; --bg-dark: #121212; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: var(--bg-dark); color: white; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 15px; border-top: 4px solid var(--main-red); }
        h2 { color: var(--main-red); text-align: center; }
        input[type="range"] { width: 100%; accent-color: var(--main-red); }
        .btn-pro { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .status-bar { background: var(--main-red); padding: 10px; position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h2>PS MEDIA PRO</h2>
        <div style="background: #252525; padding: 15px; border-radius: 10px;">
            <label>ល្បឿនអាន: <span id="speedVal">7%</span></label>
            <input type="range" id="speedRange" min="-50" max="50" value="7" oninput="document.getElementById('speedVal').innerText=this.value+'%'">
            <br><br>
            <label>គ្រលរ/ស្រួច (Pitch): <span id="pitchVal">0</span></label>
            <input type="range" id="pitchRange" min="-20" max="20" value="0" oninput="document.getElementById('pitchVal').innerText=this.value">
        </div>
        <button class="btn-pro" onclick="preview()">ស្ដាប់សាកល្បង</button>
        <audio id="audio" controls style="width:100%; margin-top:10px;"></audio>
        <input type="file" id="file" style="margin-top:20px;">
        <button class="btn-pro" onclick="translateSRT()">បកប្រែ SRT</button>
    </div>
    <div class="panel">
        <h2 style="color:white;">ឃ្លាំងផ្ទុកហ្វាយ</h2>
        <div id="output">មិនទាន់មានហ្វាយ...</div>
    </div>
</div>
<div class="status-bar"><span>PS Media Family</span></div>
<script>
    async function preview() {
        const res = await fetch('/generate_tts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                text: "សួស្តីបងប្អូន នេះជាសំឡេងពី PS Media Pro",
                speed: document.getElementById('speedRange').value + '%',
                pitch: document.getElementById('pitchRange').value + 'Hz'
            })
        });
        const data = await res.json();
        document.getElementById('audio').src = data.audio_url;
        document.getElementById('audio').play();
    }
</script>
</body>
</html>
