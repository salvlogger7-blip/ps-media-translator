<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS MEDIA PRO - MASTER CONTROL</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/logo_ps.png">
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4757; --bg: #0a0a0b; --card: #161618; --text: #eee; --success: #2ecc71; --admin: #f1c40f; }
        body { background: var(--bg); color: var(--text); font-family: 'Kantumruy Pro', sans-serif; padding: 15px; margin: 0; }
        
        .lic-bar { background: #1a1a1c; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; text-align: center; }
        .status-active { color: var(--success); font-weight: bold; font-size: 14px; }
        .timer-val { color: #fffa65; font-family: monospace; }
        .btn-copy-id { background: #444; border: none; color: #fffa65; padding: 4px 10px; border-radius: 5px; font-size: 11px; margin-top: 8px; cursor: pointer; }

        .wrapper { width: 100%; display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .logo-box { text-align: center; margin-bottom: 15px; }
        .logo-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--primary); }
        h2 { color: var(--primary); margin: 10px 0 0; font-size: 20px; }

        label { font-size: 12px; color: #aaa; display: block; margin-top: 12px; }
        .val-badge { float: right; color: var(--primary); font-weight: bold; }
        select, input, .btn-main { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; margin-top: 5px; outline: none; box-sizing: border-box; font-family: 'Kantumruy Pro'; }
        input[type="range"] { accent-color: var(--primary); height: 5px; }

        .btn-main { background: var(--primary); border: none; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .btn-preview { background: #333; height: 40px; font-size: 13px; margin-top: 10px; }

        .file-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 10px; }
        .file-item { background: #1e1e21; border-radius: 12px; padding: 12px; border: 1px solid #333; }
        audio { width: 100%; height: 35px; filter: invert(1); margin: 8px 0; }
        .btn-sm { padding: 8px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 11px; flex: 1; cursor: pointer; }

        #pBox { margin-top: 15px; background: #111; padding: 10px; border-radius: 10px; }
        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }

        /* Admin Style */
        .admin-card { border-color: var(--admin); margin-top: 40px; }
        .admin-title { color: var(--admin); margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .btn-admin { background: var(--admin); color: #000; }
    </style>
</head>
<body>

<div class="lic-bar">
    <div id="lic-status" class="status-active">កំពុងពិនិត្យអាជ្ញាប័ណ្ណ...</div>
    <div style="font-size:11px; color:#888;">
        ID របស់អ្នក: <span id="display-id">...</span> | ផុតកំណត់: <span id="lic-timer" class="timer-val">--:--</span>
    </div>
    <button class="btn-copy-id" onclick="copyID()">📋 ចម្លង ID ផ្ញើទៅម្ចាស់</button>
</div>

<div class="wrapper">
    <div class="card">
        <div class="logo-box">
            <img src="/static/logo_ps.png" class="logo-img">
            <h2>PS MEDIA PRO</h2>
        </div>
        
        <div id="app-content" style="display: none;">
            <label>🎭 ជ្រើសរើសសំឡេង:</label>
            <select id="voice">
                <option value="km-KH-SreymomNeural">កញ្ញា ស្រីមុំ (ស្រី)</option>
                <option value="km-KH-PisethNeural">លោក ពិសិដ្ឋ (ប្រុស)</option>
            </select>

            <label>⚡ ល្បឿនអាន: <span id="sVal" class="val-badge">5%</span></label>
            <input type="range" id="speed" min="-15" max="90" value="5" oninput="sVal.innerText=this.value+'%'">

            <div style="background: #111; padding: 12px; border-radius: 12px; margin-top: 12px;">
                <label style="margin-top:0;">🔊 គ្រលរ/ស្រួច (Pitch): <span id="pVal" class="val-badge">4</span></label>
                <input type="range" id="pitch" min="-15" max="15" value="4" oninput="pVal.innerText=this.value">
                
                <label>🎚️ ប្រភេទសំឡេង (Presets):</label>
                <select id="preset">
                    <option value="normal">ធម្មតា (Original)</option>
                    <option value="bass">Bass (បុកបាស)</option>
                    <option value="reverb">Reverb (រណ្តំ)</option>
                    <option value="studio">Studio (ថ្លាឆ្វង់)</option>
                </select>
            </div>

            <button id="btnPreview" class="btn-main btn-preview" onclick="preview()">🎧 ស្ដាប់សំឡេងសាកល្បង</button>
            <audio id="preAudio" style="display:none"></audio>

            <label style="color:var(--primary); margin-top:15px;">✍️ ឈ្មោះហ្វាយផលិតរួច:</label>
            <input type="text" id="filename" placeholder="ដាក់ឈ្មោះហ្វាយនៅទីនេះ...">

            <label>📁 បញ្ចូលហ្វាយ SRT:</label>
            <input type="file" id="srtFile" accept=".srt">

            <div id="pBox" style="display:none;">
                <div id="stat" style="font-size:11px; text-align:center; color:var(--primary);">កំពុងផលិត... 0%</div>
                <div class="progress-container"><div id="pFill" class="progress-fill"></div></div>
            </div>

            <button id="btnRun" class="btn-main" onclick="start()">🚀 ចាប់ផ្ដើមផលិតហ្វាយពេញ</button>
        </div>
        
        <div id="lock-msg" style="text-align: center; padding: 20px; color: #ff4757; display: none;">
            ⚠️ មិនទាន់មានសិទ្ធិប្រើប្រាស់ទេ! សូមផ្ញើ ID ខាងលើទៅម្ចាស់ App។
        </div>
    </div>

    <div class="card dashboard">
        <h4 style="color:var(--primary); margin:0 0 10px 0;">📂 ឃ្លាំងហ្វាយរបស់អ្នក</h4>
        <div id="fileList" class="file-grid">
            <p style="font-size: 11px; color: #555; text-align: center;">មិនទាន់មានហ្វាយផលិតរួចនៅឡើយ</p>
        </div>
    </div>

    <div class="card admin-card">
        <h3 class="admin-title">🔑 Admin License Control</h3>
        <input type="password" id="adminPass" placeholder="Admin Password">
        <input type="text" id="targetId" placeholder="បញ្ចូល Device ID ភ្ញៀវ">
        <label>ជ្រើសរើសថ្ងៃផុតកំណត់:</label>
        <input type="date" id="expiryDate">
        <button class="btn-main btn-admin" onclick="createLicense()">✅ បង្កើត License ឥឡូវនេះ</button>
    </div>
</div>

<script>
    let srtData = [];

    // --- DEVICE ID & LICENSE ---
    function getDeviceID() {
        let id = localStorage.getItem('ps_device_id');
        if (!id) {
            id = 'PS-MOB-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            localStorage.setItem('ps_device_id', id);
        }
        return id;
    }

    async function checkLicense() {
        const myId = getDeviceID();
        document.getElementById('display-id').innerText = myId;
        
        try {
            const res = await fetch('/api/check_license', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ device_id: myId })
            });
            const d = await res.json();
            
            if (d.authorized) {
                document.getElementById('lic-status').innerText = "ស្ថានភាព: " + d.status;
                document.getElementById('lic-timer').innerText = d.expiry;
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('lock-msg').style.display = 'none';
                loadFiles();
            } else {
                document.getElementById('lic-status').innerText = "ស្ថានភាព: " + d.status;
                document.getElementById('lock-msg').style.display = 'block';
                document.getElementById('app-content').style.display = 'none';
            }
        } catch(e) { console.error("License Error"); }
    }

    function copyID() {
        navigator.clipboard.writeText(getDeviceID());
        alert("បានចម្លង ID រួចរាល់!");
    }

    // --- ADMIN FUNCTION ---
    async function createLicense() {
        const adminPass = document.getElementById('adminPass').value;
        const deviceId = document.getElementById('targetId').value;
        const expiry = document.getElementById('expiryDate').value;

        if(!adminPass || !deviceId || !expiry) return alert("សូមបំពេញព័ត៌មានឱ្យគ្រប់!");

        const res = await fetch('/api/admin/add_license', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ admin_pass: adminPass, device_id: deviceId, expiry: expiry })
        });
        const data = await res.json();
        alert(data.status);
    }

    // --- SRT & VOICING ---
    document.getElementById('srtFile').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            const blocks = ev.target.result.replace(/\r/g, '').split('\n\n');
            srtData = blocks.map(b => {
                const lines = b.trim().split('\n');
                if(lines.length >= 3) {
                    const m = lines[1].match(/(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})/);
                    if(m) return { start: toMs(m[1]), end: toMs(m[2]), text: lines.slice(2).join(' ') };
                }
            }).filter(x => x);
            alert("រកឃើញ " + srtData.length + " ឃ្លា!");
        };
        reader.readAsText(e.target.files[0]);
    };

    function toMs(t) {
        const p = t.split(':'); const s = p[2].split(',');
        return (parseInt(p[0])*3600 + parseInt(p[1])*60 + parseInt(s[0]))*1000 + parseInt(s[1]);
    }

    async function preview() {
        const btn = document.getElementById('btnPreview');
        btn.innerText = "កំពុងរៀបចំ..."; btn.disabled = true;
        const res = await fetch('/api/preview', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                device_id: getDeviceID(),
                text: "សួស្តីបង នេះគឺជាសំឡេងសាកល្បងរបស់អ្នក",
                voice: document.getElementById('voice').value, 
                speed: document.getElementById('speed').value,
                pitch: document.getElementById('pitch').value, 
                preset: document.getElementById('preset').value 
            })
        });
        const d = await res.json();
        const a = document.getElementById('preAudio'); a.src = d.url; a.play();
        btn.innerText = "🎧 ស្ដាប់សំឡេងសាកល្បង"; btn.disabled = false;
    }

    async function start() {
        if(!srtData.length) return alert("សូមបញ្ចូល SRT!");
        document.getElementById('btnRun').disabled = true;
        document.getElementById('pBox').style.display = 'block';

        const res = await fetch('/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                device_id: getDeviceID(),
                items: srtData, 
                filename: document.getElementById('filename').value,
                voice: document.getElementById('voice').value, 
                speed: document.getElementById('speed').value,
                pitch: document.getElementById('pitch').value, 
                preset: document.getElementById('preset').value 
            })
        });
        const { task_id } = await res.json();
        const interval = setInterval(async () => {
            const r = await fetch('/api/progress/' + task_id);
            const d = await r.json();
            if(d.progress === "done") {
                clearInterval(interval);
                document.getElementById('pFill').style.width = "100%";
                document.getElementById('stat').innerText = "ផលិតជោគជ័យ!";
                document.getElementById('btnRun').disabled = false;
                loadFiles();
            } else {
                document.getElementById('pFill').style.width = d.progress + "%";
                document.getElementById('stat').innerText = "កំពុងផលិត... " + d.progress + "%";
            }
        }, 1500);
    }

    async function loadFiles() {
        const res = await fetch('/api/files', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ device_id: getDeviceID() })
        });
        const files = await res.json();
        if(files.length > 0) {
            document.getElementById('fileList').innerHTML = files.map(f => `
                <div class="file-item">
                    <div style="font-size:11px; color:var(--primary); font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">📄 ${f.name}</div>
                    <audio controls preload="none"><source src="${f.url}"></audio>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-sm" style="background:var(--success)" onclick="window.open('${f.url}')">ទាញយក</button>
                        <button class="btn-sm" style="background:#444" onclick="deleteFile('${f.real_name}')">លុប</button>
                    </div>
                </div>`).join('');
        }
    }

    async function deleteFile(n) { if(confirm("លុបហ្វាយនេះ?")) { await fetch('/api/delete/'+n, {method:'DELETE'}); loadFiles(); } }

    window.onload = checkLicense;
</script>
</body>
</html>
